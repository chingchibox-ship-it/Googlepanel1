<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAFTL Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:#111827;
padding:20px;
text-align:center;
font-size:30px;
color:#00ff88;
font-weight:bold;
}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

.card{
background:#161b22;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:12px;
margin-bottom:20px;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
background:#00ff88;
color:black;
border:none;
padding:15px 25px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.plugin{
background:#222;
padding:15px;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}
</style>
</head>

<body>

<header>AAFTL Admin Dashboard</header>

<div class="container">

<div class="card">

<h2>Add Plugin</h2>

<input placeholder="Plugin Name">

<input placeholder="Minecraft Version">

<input placeholder="Plugin Version">

<input placeholder="Download Link">

<select>
<option>Free</option>
<option>Premium</option>
</select>

<textarea rows="6" placeholder="Plugin Description"></textarea>

<button>Add Plugin</button>

</div>

<div class="card">

<h2>Your Plugins</h2>

<div class="plugin">
<span>AAFTL Core</span>
<button>Edit</button>
</div>

<div class="plugin">
<span>AAFTL Lifesteal</span>
<button>Edit</button>
</div>

<div class="plugin">
<span>AAFTL RTP</span>
<button>Edit</button>
</div>

<div class="plugin">
<span>AAFTL Crates</span>
<button>Edit</button>
</div>

<div class="plugin">
<span>AAFTL Shop</span>
<button>Edit</button>
</div>

</div>

</div>

</body>
