<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAFTL Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#161b22;
padding:40px;
border-radius:15px;
width:350px;
}

h1{
text-align:center;
color:#00ff88;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#00ff88;
color:black;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

p{
text-align:center;
margin-top:15px;
color:#aaa;
}

a{
color:#00ff88;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h1>AAFTL Login</h1>

<input type="text" placeholder="Username">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Login</button>

<p>Don't have an account? <a href="#">Sign Up</a></p>

</div>

</body>
</html>
